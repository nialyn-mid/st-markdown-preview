<div id="st-markdown-preview-container">
    <div id="st-markdown-preview-header">
        <span data-i18n="Preview">Preview</span>
    </div>
    <div id="st-markdown-preview-content"></div>
</div>

<div id="st-markdown-preview-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="Markdown Preview">Markdown Preview</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container">
                <label class="checkbox_label" for="st-markdown-preview-enabled">
                    <input id="st-markdown-preview-enabled" type="checkbox" checked />
                    <span data-i18n="Enable live preview">Enable live preview</span>
                </label>
            </div>
        </div>
    </div>
</div>
